name: refresh

on:
  schedule:
    - cron: "*/30 * * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Fetch ESPN results
        run: python scripts/fetch_results.py
      - name: Generate ICS + site
        run: python scripts/generate.py
      - name: Commit if changed
        run: |
          if [[ -n "$(git status --porcelain data/matches.json docs/)" ]]; then
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add data/matches.json docs/
            git commit -m "auto: refresh results [skip ci]"
            git pull --rebase
            git push
          else
            echo "no changes"
          fi
