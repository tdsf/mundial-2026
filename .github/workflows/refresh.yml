name: refresh

on:
  schedule:
    - cron: "*/30 * * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: '3.12'
      - name: Fetch ESPN results
        run: timeout 120 python scripts/fetch_results.py
        timeout-minutes: 3
      - name: Generate ICS + site
        run: timeout 120 python scripts/generate.py
        timeout-minutes: 3
      - name: Commit if changed
        run: |
          if [[ -n "$(git status --porcelain data/matches.json docs/)" ]]; then
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add data/matches.json docs/
            git commit -m "auto: refresh results [skip ci]"
            timeout 60 git pull --rebase || true
            timeout 60 git push || true
          else
            echo "no changes"
          fi
        timeout-minutes: 5
